<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>栩你渝生投票提醒</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:"Microsoft YaHei";

  background:
    linear-gradient(135deg, rgba(246,255,230,0.85), rgba(212,240,176,0.85)),
    url("vd.png");

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  overflow:hidden;
  color:#3a5a1a;
}

.top-marquee{
  position:fixed;top:0;left:0;width:100%;height:52px;
  background:rgba(255,255,255,0.5);
  backdrop-filter: blur(8px);
  z-index:20;display:flex;align-items:center;
}
.top-marquee-track{
  white-space:nowrap;
  padding-left:100%;
  animation:marquee 16s linear infinite;
  font-size:20px;font-weight:700;
}
@keyframes marquee{
  from{transform:translateX(0);}
  to{transform:translateX(-100%);}
}

.main{
  position:relative;
  z-index:30;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:70px 14px 20px;
}

.title{
  font-size:52px;
  font-weight:900;
  animation:breath 3s ease-in-out infinite;
}
@keyframes breath{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.05);}
}

.subtitle{font-size:24px;margin-bottom:6px;}

.rank-tip{
  margin-bottom:10px;
  font-size:16px;
  color:#5a7a1a;
  font-weight:600;
}

.countdown{
  font-size:20px;
  background:rgba(255,255,255,.6);
  padding:10px 16px;
  border-radius:16px;
  margin-bottom:18px;
}

.danmu-layer{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  z-index:10;
  pointer-events:none;
}

.danmu-item{
  position:absolute;
  white-space:nowrap;
  padding:5px 12px;
  border-radius:16px;
  font-size:16px;
  font-weight:700;
  color:#2a3a1a;
  background:linear-gradient(135deg,#f0ffd9,#b7e27a,#9acd32);
  animation:danmuMove linear forwards;
}

@keyframes danmuMove{
  from{transform:translateX(0);}
  to{transform:translateX(-220vw);}
}

.danmu-panel{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  width:90%;
  max-width:520px;
  margin-bottom:18px;
}

.danmu-panel button{
  padding:12px 10px;
  border-radius:999px;
  border:none;
  font-weight:700;
  cursor:pointer;
  transition:all 0.25s;
  background:linear-gradient(135deg,#f0ffd9,#b7e27a);
}

.danmu-panel button:active{
  transform:scale(0.9);
}

.danmu-panel button.clicked{
  animation:pop 0.3s;
}
@keyframes pop{
  50%{transform:scale(1.15);}
}

.top-rank{
  background:linear-gradient(135deg,#7cb329,#4caf50) !important;
  color:#fff !important;
  transform:scale(1.05);
  box-shadow:0 0 15px rgba(124,179,41,0.6);
}

.action-buttons{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.action-buttons button{
  border:none;
  border-radius:14px;
  padding:10px 14px;
  background:linear-gradient(135deg,#9acd32,#7cb329);
  color:#fff;
  cursor:pointer;
}

.tutorial-btn{
  margin-top:14px;
  padding:10px 18px;
  border-radius:16px;
  background:linear-gradient(135deg,#d4f0b0,#9acd32);
  color:#2a3a1a;
  font-weight:700;
  text-decoration:none;
  display:inline-block;
}

@media(max-width:520px){
  .title{font-size:42px;}
  .subtitle{font-size:20px;}
  .countdown{font-size:17px;}
  .danmu-panel{grid-template-columns:1fr;}
}

.brand-inline{
  display:inline-flex;
  align-items:center;
  gap:6px;
}

.logo-inline{
  width:24px;
  height:24px;
  border-radius:50%;
  object-fit:cover;
}
/* ✅ 手机优化（不改结构版） */
@media(max-width:520px){

  .title{
    font-size:34px; /* 再小一点更舒服 */
  }

  .subtitle{
    font-size:18px;
  }

  .top-marquee-track{
    font-size:16px; /* 顶部别太挤 */
    animation:marquee 20s linear infinite; /* 慢一点 */
  }

  .action-buttons button{
    padding:14px 0; /* 更好点 */
    font-size:16px;
  }

  .danmu-panel button{
    padding:14px 12px;
    font-size:15px;
  }
}
</style>
</head>

<body>

<div class="top-marquee">
  <div class="top-marquee-track">

    <span class="brand-inline">
      <img src="logo.jpg" class="logo-inline">
      米米宇宙出品
    </span>

    &nbsp;&nbsp;&nbsp;&nbsp;
    ❗凌晨别签到（会被吞）！！白天一定要签到！！单日冲10w！！！

  </div>
</div>

<div class="danmu-layer" id="danmuLayer"></div>

<main class="main">
  <div class="title">25号微店投票！！记得签到！！</div>
  <div class="subtitle">签到单日冲10w！！</div>
  <div class="rank-tip" id="rankTip"></div>
  <div class="countdown" id="countdown"></div>

  <div class="danmu-panel" id="danmuPanel"></div>

  <div class="action-buttons">
    <button onclick="showReminder()">立刻提醒</button>
    <button onclick="copySlogan()">复制文案</button>
    <button onclick="addCalendar()">📅 日历提醒</button>
  </div>

  <a href="https://weibo.com/8387849163/QBzpZoDXU" target="_blank" class="tutorial-btn">
    📘 不会投？点这里看教程
  </a>
</main>

<script>
function showReminder(){
  alert("❗凌晨别签到（容易被吞）！！\n✅一定要签到！！\n🔥单日冲10w！！！");
}

function copySlogan(){
  navigator.clipboard.writeText("25号微店集合10w！大家呼朋唤友一起来呀，助力only展！！");
  alert("已复制！");
}

function addCalendar(){
  const start = new Date();
  start.setDate(25);
  start.setHours(9,0,0);

  const end = new Date(start.getTime() + 60*60*1000);

  const format = d =>
    d.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";

  const ics = `
BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:25号投栩你渝生！
DESCRIPTION:记得去微店投票！
DTSTART:${format(start)}
DTEND:${format(end)}
END:VEVENT
END:VCALENDAR`.trim();

  const url = "data:text/calendar;charset=utf8," + encodeURIComponent(ics);
  window.location.href = url;
}

function updateCountdown(){
  const now=new Date();
  let target=new Date();
  target.setDate(25);
  target.setHours(0,0,0,0);
  if(now.getDate()>25) target.setMonth(target.getMonth()+1);

  const diff=target-now;
  const d=Math.floor(diff/86400000);
  const h=Math.floor(diff/3600000%24);
  const m=Math.floor(diff/60000%60);
  const s=Math.floor(diff/1000%60);

  document.getElementById("countdown").innerText=
    `距离25号：${d}天 ${h}时 ${m}分 ${s}秒`;
}
setInterval(updateCountdown,1000);
updateCountdown();

const danmuTexts=[
  "雷朋99","栩你渝生此生平安幸福","雷朋长命百岁",
  "栩光同行潮汐不渝","爱情伟大","123进"
];

let danmuStats=JSON.parse(localStorage.getItem("danmuStats")||"{}");
danmuTexts.forEach(t=>{ if(!danmuStats[t]) danmuStats[t]=0; });

function renderBtns(){
  const box=document.getElementById("danmuPanel");
  box.innerHTML="";

  let maxName="",maxCount=0;
  danmuTexts.forEach(t=>{
    if(danmuStats[t]>maxCount){
      maxCount=danmuStats[t];
      maxName=t;
    }
  });

  if(maxCount>0){
    document.getElementById("rankTip").innerText=
      `🔥 当前最火：${maxName}（${maxCount}票）`;
  }

  danmuTexts.forEach(t=>{
    const b=document.createElement("button");
    const count=danmuStats[t];
    b.innerText=`${t}（${count}）`;

    if(t===maxName && maxCount>0){
      b.classList.add("top-rank");
    }

    b.onclick=()=>{
      b.classList.add("clicked");
      setTimeout(()=>b.classList.remove("clicked"),300);

      danmuStats[t]++;
      localStorage.setItem("danmuStats",JSON.stringify(danmuStats));
      renderBtns();

      sendDanmu(t);
      setTimeout(()=>sendDanmu(t),200);
      setTimeout(()=>sendDanmu(t),400);
    };

    box.appendChild(b);
  });
}
renderBtns();

function sendDanmu(text){
  const layer=document.getElementById("danmuLayer");
  const d=document.createElement("div");
  d.className="danmu-item";
  d.innerText=text;

  d.style.top=(Math.random()*85+5)+"%";
  d.style.left="100%";

  const duration=32+Math.random()*6;
  d.style.animationDuration=duration+"s";

  layer.appendChild(d);
  setTimeout(()=>d.remove(),duration*1000);
}
</script>

</body>
</html>
